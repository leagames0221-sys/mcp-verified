name: secrets-scan

# Redundant post-push credential sweep. Phase 1 defense layer 3 in
# the four-layer chain documented in `.pre-commit-config.yaml`:
#   Layer 1 = client-side write-time guard (out of repo).
#   Layer 2 = pre-commit (.pre-commit-config.yaml).
#   Layer 3 = this workflow (post-push, redundant on top of gitleaks).
#   Layer 4 = scripts/private_path_check.sh manual sweep.
#
# The redundancy is deliberate: gitleaks runs as a separate workflow so
# its failure does not mask a private-path or license-audit regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  private-path:
    name: private path leak guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run private_path_check.sh
        run: bash scripts/private_path_check.sh

  license-audit:
    name: dependency license audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project (no dev deps required for audit)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "."

      - name: Run audit_deps.py
        run: python scripts/audit_deps.py
