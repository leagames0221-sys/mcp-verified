name: gitleaks

# Canonical secrets scan via the official gitleaks-action.
# Runs on every push to main, every PR targeting main, and on a weekly
# cron so a stale credential committed via a missed pre-commit hook is
# still surfaced within the week.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: this repo is private under the Free GitHub
          # account, which the action runs against without a license key.
